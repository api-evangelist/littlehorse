naftiko: 1.0.0-alpha2
info:
  label: LittleHorse REST API — Node Runs
  description: 'LittleHorse REST API — Node Runs. 1 operations. Lead operation: Get a node run. Self-contained Naftiko capability
    covering one Littlehorse business surface.'
  tags:
  - Littlehorse
  - Node Runs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LITTLEHORSE_API_KEY: LITTLEHORSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: littlehorse-node-runs
    baseUri: ''
    description: LittleHorse REST API — Node Runs business capability. Self-contained, no shared references.
    resources:
    - name: nodeRun-wfRunId-threadRunNumber-position
      path: /nodeRun/{wfRunId}/{threadRunNumber}/{position}
      operations:
      - name: getnoderun
        method: GET
        description: Get a node run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: wfRunId
          in: path
          type: string
          required: true
        - name: threadRunNumber
          in: path
          type: integer
          required: true
        - name: position
          in: path
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: littlehorse-node-runs-rest
    port: 8080
    description: REST adapter for LittleHorse REST API — Node Runs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/noderun/{wfrunid}/{threadrunnumber}/{position}
      name: noderun-wfrunid-threadrunnumber-position
      description: REST surface for nodeRun-wfRunId-threadRunNumber-position.
      operations:
      - method: GET
        name: getnoderun
        description: Get a node run
        call: littlehorse-node-runs.getnoderun
        with:
          wfRunId: rest.wfRunId
          threadRunNumber: rest.threadRunNumber
          position: rest.position
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: littlehorse-node-runs-mcp
    port: 9090
    transport: http
    description: MCP adapter for LittleHorse REST API — Node Runs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-node-run
      description: Get a node run
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: littlehorse-node-runs.getnoderun
      with:
        wfRunId: tools.wfRunId
        threadRunNumber: tools.threadRunNumber
        position: tools.position
      outputParameters:
      - type: object
        mapping: $.
