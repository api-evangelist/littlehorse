naftiko: 1.0.0-alpha2
info:
  label: LittleHorse REST API
  description: The LittleHorse REST API provides HTTP endpoints for managing workflow specifications (WfSpec), workflow runs
    (WfRun), task definitions (TaskDef), external event definitions, user tasks, and other resources in the LittleHorse workflow
    engine.
  tags:
  - Littlehorse
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: littlehorse
    baseUri: http://localhost:2023
    description: LittleHorse REST API HTTP API.
    resources:
    - name: wfspec
      path: /wfSpec
      operations:
      - name: listwfspecs
        method: GET
        description: List workflow specifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: putwfspec
        method: POST
        description: Create or update a workflow specification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: wfspec-name
      path: /wfSpec/{name}
      operations:
      - name: getwfspec
        method: GET
        description: Get a workflow specification
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        - name: majorVersion
          in: query
          type: integer
        - name: revision
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletewfspec
        method: DELETE
        description: Delete a workflow specification
        inputParameters:
